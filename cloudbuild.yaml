steps:
  - name: gcr.io/k8s-skaffold/pack
    id: Buildpack
    entrypoint: pack
    args:
      - build
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --builder=gcr.io/buildpacks/builder:latest
      - --network=cloudbuild
      - --path=.
    env:
      - GOOGLE_BUILDABLE=.

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - >-
        $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - --platform=managed
      - --region=$_DEPLOY_REGION
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - >-
        --set-env-vars=NODE_ENV=production,SUPABASE_URL=$_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY=$_SUPABASE_SERVICE_ROLE_KEY,OPENAI_API_KEY=$_OPENAI_API_KEY,GEMINI_API_KEY=$_GEMINI_API_KEY,RAZORPAY_KEY_ID=$_RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET=$_RAZORPAY_KEY_SECRET,RAZORPAY_PLAN_PRO=$_RAZORPAY_PLAN_PRO,RAZORPAY_PLAN_PRO_YEARLY=$_RAZORPAY_PLAN_PRO_YEARLY,RAZORPAY_PLAN_STARTER=$_RAZORPAY_PLAN_STARTER,RAZORPAY_PLAN_STARTER_YEARLY=$_RAZORPAY_PLAN_STARTER_YEARLY,RAZORPAY_WEBHOOK_SECRET=$_RAZORPAY_WEBHOOK_SECRET,SENDGRID_API_KEY=$_SENDGRID_API_KEY,SENDGRID_FROM_EMAIL=$_SENDGRID_FROM_EMAIL,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$_GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI=$_GOOGLE_REDIRECT_URI,NEXT_PUBLIC_APP_URL=$_NEXT_PUBLIC_APP_URL,PERPLEXITY_API_KEY=$_PERPLEXITY_API_KEY,API_URL=$_API_URL
      - --quiet

images:
  - >-
    $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME/$_SERVICE_NAME:$COMMIT_SHA

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY